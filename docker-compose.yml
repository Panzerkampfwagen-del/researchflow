services:
  db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: researchflow
      POSTGRES_PASSWORD: password
      POSTGRES_DB: researchflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U researchflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://researchflow:password@db:5432/researchflow
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      HF_HOME: /hf_cache
    volumes:
      - hf_cache:/hf_cache
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    # Single worker: SSE pub/sub, the background research task, and session
    # params are in-process globals, so a 2nd worker would field /stream requests
    # for runs it never started and emit spurious "failed" frames. Scale out via
    # Redis-backed pub/sub (see README) before raising this.
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata:
  hf_cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/aryan/.cache/huggingface
