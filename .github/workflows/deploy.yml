name: Deploy

# Runs only after CI passes on main. Triggers a Render deploy via deploy
# hook so production only updates when tests and lint are green.
# Vercel redeploys automatically via its GitHub integration on every push.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy-backend:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}"

      - name: Poll backend health
        env:
          RENDER_SERVICE_URL: ${{ secrets.RENDER_SERVICE_URL }}
        run: |
          if [ -z "$RENDER_SERVICE_URL" ]; then
            echo "RENDER_SERVICE_URL not set; skipping health poll."
            exit 0
          fi
          for i in $(seq 1 18); do
            if curl -fsS "${RENDER_SERVICE_URL%/}/api/health"; then
              echo "Backend healthy."
              exit 0
            fi
            echo "Attempt $i: backend not ready, retrying in 10s..."
            sleep 10
          done
          echo "Backend did not become healthy within 3 minutes."
          exit 1
