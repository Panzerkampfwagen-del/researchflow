services:
  - type: web
    name: researchflow-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.render
    dockerContext: ./backend
    plan: free
    envVars:
      # Injected automatically from the Render-managed database below
      - key: DATABASE_URL
        fromDatabase:
          name: researchflow-db
          property: connectionString

      # Set these in the Render dashboard (Environment → Secret Files / Env Vars)
      - key: GROQ_API_KEY
        sync: false
      - key: SEMANTIC_SCHOLAR_API_KEY
        sync: false

      # Leave Anthropic empty unless you have a key
      - key: ANTHROPIC_API_KEY
        value: ""

      # Model names
      - key: GROQ_REASONING_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_EXTRACTION_MODEL
        value: llama-3.1-8b-instant

      # fastembed ONNX model — 384-dim, no PyTorch, ~60 MB RAM
      - key: EMBEDDING_MODEL
        value: BAAI/bge-small-en-v1.5
      - key: FASTEMBED_CACHE_DIR
        value: /app/.cache/fastembed

      # Cross-encoder reranker and NLI grounding both disabled on the free tier
      # to keep peak RAM well under 512 MB (no sentence-transformers/PyTorch loaded).
      - key: RERANK_ENABLED
        value: "false"
      - key: GROUNDING_ENABLED
        value: "false"

databases:
  - name: researchflow-db
    databaseName: researchflow
    plan: free
