services:
  - type: web
    name: researchflow-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.render
    dockerContext: ./backend
    plan: free
    envVars:
      # Set these in the Render dashboard (Environment → Env Vars). DATABASE_URL
      # points at an external Neon Postgres (postgresql+asyncpg://…?sslmode=require).
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SEMANTIC_SCHOLAR_API_KEY
        sync: false
      # Hosted embeddings — required on the free tier (no local model installed).
      - key: JINA_API_KEY
        sync: false

      # Leave Anthropic empty unless you have a key
      - key: ANTHROPIC_API_KEY
        value: ""

      # Model names
      - key: GROQ_REASONING_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_EXTRACTION_MODEL
        value: llama-3.1-8b-instant

      # Embeddings via Jina API — 384-dim (Matryoshka-truncated), no local model
      - key: JINA_MODEL
        value: jina-embeddings-v3

      # Cross-encoder reranker and NLI grounding both disabled on the free tier
      # to keep peak RAM well under 512 MB (no sentence-transformers/PyTorch loaded).
      - key: RERANK_ENABLED
        value: "false"
      - key: GROUNDING_ENABLED
        value: "false"
